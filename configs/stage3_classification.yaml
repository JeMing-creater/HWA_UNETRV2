trainer:
  warmup: 0
  batch_size: 2
  resume: false
  lr: 0.001
  min_lr: 1.0e-07
  min_free_gpu_mem_gb: 16.0
  optimizer: adamw
  weight_decay: 0.05
  betas:
  - 0.9
  - 0.95
  model_variant: soft_prior
  task: classification
  resume_train: false
  grad_accum_steps: 1
  num_epochs: 100
stage_train:
  visualization:
    enable: false
    save_dir: ./center_anchor_visuals_stage2_v32_gate015
    every_n_epochs: 1
    max_cases: 1
    figure_dpi: 96
    pred_threshold: 0.5
    gt_alpha: 0.62
    gt_color_rgb:
    - 169
    - 209
    - 238
    pred_color_rgb:
    - 255
    - 80
    - 80
    detector_pred_color: red
    pred_alpha: 0.5
    heat_alpha: 0.45
    keep_last_n_epochs: 5
  stage1:
    epochs: 0
    lr: 5.0e-05
    min_lr: 1.0e-07
    checkpoint_name: HWA_stage1_detector
    init_checkpoint: None
    resume: false
    detector_lr_scale: 1.0
    lambda_center_modal: 1.2
    lambda_center_inside: 2.0
    lambda_center_coarse_modal: 0.1
    lambda_center_coarse_inside: 0.2
    lambda_sigma_reg: 0.0
    lambda_conf_reg: 0.0
    lambda_evidence_supervise: 2.0
    lambda_evidence_outside: 0.25
    lambda_raw_evidence_supervise: 0.0
    lambda_raw_evidence_outside: 0.0
    lambda_fused_support_supervise: 0.0
    lambda_fused_support_outside: 0.0
    lambda_scale_floor: 0.02
    lambda_evidence_peak: 0.0
    evidence_start_epoch: 2
    evidence_ramp_epochs: 6
    sigma_min: 2.0
    sigma_shrink_ratio: 0.8
    max_sigma_xyz:
    - 12.0
    - 12.0
    - 8.0
    target_roi_size_xyz:
    - 24
    - 24
    - 12
    center_core_weight: 0.6
    core_erosion_kernel: 5
    core_erosion_iters: 1
    inside_lesion_weight: 0.5
    evidence_core_weight: 0.85
    evidence_lesion_weight: 0.2
    evidence_gaussian_weight: 0.6
    evidence_gaussian_sigma_scale: 0.55
    sigma_conf_start_epoch: 4
    sigma_conf_ramp_epochs: 4
    scale_floor_tau: 0.1
    evidence_peak_margin: 0.2
  stage2:
    epochs: 0
    lr: 1.2e-05
    min_lr: 1.0e-07
    checkpoint_name: HWA_stage2_segmentation
    init_seg_checkpoint: None
    init_seg_checkpoint_scope: compatible
    init_checkpoint: None
    init_checkpoint_scope: detector
    resume: false
    use_hwa_prior_in_encoder: true
    compute_hd95: false
    disable_prior_training: false
    use_detector_debug: true
    gate_entropy_target: 0.6
    prior_enable_epoch: 0
    prior_ramp_epochs: 6
    prior_lr_boost: 0.3
    prior_localize_boost: 0.0
    prior_localize_loss_scale: 0.0
    prior_localize_target_ratio: 0.55
    prior_quality_budget: 0.12
    prior_feature_energy_budget: 0.1
    evidence_aux_loss_scale: 0.0
    fused_support_aux_loss_scale: 0.0
    lambda_center_aux_start: 0.0
    lambda_center_aux_end: 0.0
    lambda_center_inside_aux_start: 0.004
    lambda_center_inside_aux_end: 0.001
    lambda_sigma_aux_start: 0.0
    lambda_sigma_aux_end: 0.0
    lambda_evidence_aux_start: 0.0
    lambda_evidence_aux_end: 0.0
    lambda_conf_aux_start: 0.0
    lambda_conf_aux_end: 0.0
    lambda_scale_floor_aux_start: 0.0
    lambda_scale_floor_aux_end: 0.0
    lambda_prior_energy_start: 0.0
    lambda_prior_energy_end: 0.0
    lambda_gate_reg_start: 0.0
    lambda_gate_reg_end: 0.0
    prior_alpha_cap_start: 0.045
    prior_alpha_cap_end: 0.075
    prior_alpha_cap_floor: 0.0
    detector_lr_scale_start: 0.001
    detector_lr_scale_end: 0.0003
    prior_fusion_lr_scale_start: 0.006
    prior_fusion_lr_scale_end: 0.012
    prior_builder_lr_scale_start: 0.006
    prior_builder_lr_scale_end: 0.012
    seg_lr_scale: 0.18
    freeze_seg_backbone_epochs: 2
    unfreeze_shallow_epochs: 0
    eval_init: true
    early_stop_start_epoch: 80
    early_stop_patience: 40
    early_stop_min_delta: 0.001
    input_hwa_gate_start: 1.0
    input_hwa_gate_end: 1.0
    input_hwa_gain_start: 1.0
    input_hwa_gain_end: 1.0
    hwa_input_agg_gain_init: 0.42
    hwa_input_gate_boost_init: 1.18
    hwa_center_prior_gain_init: 0.06
    force_hwa_gain_init_after_compatible: false
    hwa_input_agg_gain_max: 0.48
    hwa_input_enhance_gain_init: 0.05
    hwa_input_enhance_gain_max: 0.1
    hwa_input_gate_scale_max: 1.06
    hwa_input_delta_std_clip: 1.3
    hwa_output_logit_gain_init: 0.03
    hwa_output_logit_gain_max: 0.3
    freeze_hwa_gains: false
    input_fusion_lr_scale: 0.12
    hwa_advantage_loss_scale: 0.0015
    hwa_advantage_margin: 0.0002
    hwa_advantage_epochs: 8
    hwa_advantage_metric: dice
    seg_loss_mode: global_dice_bce
    seg_target_mode: union
    seg_metric_mode: global
    pred_threshold: 0.55
    bce_pos_weight: 4.0
    tversky_alpha: 0.3
    tversky_beta: 0.7
    train_seg_head_when_backbone_frozen: true
    train_seg_tail_when_backbone_frozen: true
    stack_train_splits: true
    stack_train_base_repeats: 4
    stack_train_val_repeats: 0
    stack_train_test_repeats: 0
    stack_train_limit: 0
    allow_eval_split_training: false
    stack_train_shuffle: true
    stack_train_eval_transforms: false
    use_stacked_main_metric: false
    stacked_train_weight: 0.0
    stacked_eval_weight: 1.0
    use_reported_eval_metric: false
    reported_eval_floor: 0.0
    reported_eval_cap: 1.0
    reported_eval_max_overfit_gap: 1.0
    reported_eval_gap_margin: 0.0
    reported_eval_hwa_bonus_scale: 0.0
    eval_hwa_ablation: true
    fast_scalar_metrics: true
    skip_best_test_eval: false
  stage3:
    epochs: 100
    lr: 0.001
    min_lr: 1.0e-07
    checkpoint_name: HWA_stage3_classification
    init_checkpoint: HWA_stage2_segmentation
    resume: false
    classifier_lr_scale: 1.0
    lambda_class: 1.0
    lambda_pfs: 1.0
GCM_loader:
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2
  fusion: false
  time_limit: false
  num_workers: 0
  over_label: false
  over_add: 10
  fix_example: true
  task_Mu: 1
  task: LM
  task_choose: LM_FRS
  leapfrog: []
  root: /path/to/GCM_dataset
  checkModels:
  - ADC
  - T2_FS
  - V
  model_scale:
  - - 0
    - 6000
  - - 0
    - 4500
  - - 0
    - 4500
  target_size:
  - 128
  - 128
  - 64
  train_examples_path: splits/train_examples.txt
  val_examples_path: splits/val_examples.txt
  test_examples_path: splits/test_examples.txt
  train_over_label: false
  train_over_add: 10
  val_over_label: false
  val_over_add: 10
  test_over_label: false
  test_over_add: 10
project:
  name: HWA-UNETRv2
  description: Stage-wise multimodal gastric MRI analysis framework.
