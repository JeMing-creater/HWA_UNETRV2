trainer:
  choose_model: UXNET   # # Class: [HWAUNETR ,HSL_Net, TFM_UNET_class, ResNet, Vit, TP_Mamba, X3D, AMSNET, HCNN, M3T, Med3D, Swin3D] Seg: [HSL_Net, TFM_UNET_seg, CoTr, UNETR_PP, SwinUNETR, UXNET, SaBNet, nnFormer, ALIEN]
  task: Segmentation       # [Classification, Segmentation]
  choose_dataset: BraTS      # [GCM, Colon, GCNC, GICC, FS, BraTS, MNIST]
  num_epochs: 200
  warmup: 2
  batch_size: 1
  resume: True
  lr: 0.001
  # lr: 0.0001
  min_lr: 0.0000001
  optimizer: adamw
  # optimizer: adam
  weight_decay: 0.05
  # weight_decay: 1e-5
  betas: [0.9, 0.95]

finetune:
  GCM:
    checkpoint: None
  Colon:
    checkpoint: None
  GCNC:
    checkpoint: None
  GICC:
    checkpoint: None
  FS:
    checkpoint: None
  BraTS:
    checkpoint: None
  MNIST:
    checkpoint: None

GCM_loader:
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2
  # fusion: do you need test dataset? if not, can use fusion to fuse val and test data to one dataloader.
  fusion: False
  # split dataset based on check time or not.
  time_limit: False
  num_workers: 0
  over_label: False
  over_add: 10
  # use this flag can fix experiment examples, must set train_example.txt, val_example.txt and test_example.txt to root.
  fix_example: True
  # task: for different task: PM(腹膜转移分类) ; NL_SS(淋巴结同时序（手术）); NL_DS(淋巴结异时序（化疗后）)
  task_Mu: 2  # define multi-tasks number, None means single task
  task: LM  # 淋巴结转移 + FRS
  # task: DS   # 腹隔膜转移
  task_choose: LM_FRS  # LM_FRS or LMM
  # leapfrog: some data error can write in this list to remove from dataloader
  # leapfrog: ['0001902261', '0000439538','0002235469','0001308202']
  leapfrog: ["0000553614"]
  root: /mnt/liangjm/GCM/
  # checkModels: ['A', 'ADC', 'T2_FS', 'V', 'DWI', 'P']
  checkModels: ['ADC','T2_FS', 'V']
  # model_scale: [[0, 6000], [0, 4500], [0, 4500]] # 对应模态的最小最大像素值，用于归一化
  model_scale: [[0, 6000],[0, 4500],[0, 4500]] # 对应模态的最小最大像素值，用于归一化
  target_size: [128, 128, 64]


colon_loader:
  root: "/mnt/liangjm/AbdomenAtlas2/AbdomenAtlas2.0/data/AbdomenAtlas2.0"
  pos_txt: "/mnt/liangjm/AbdomenAtlas2/AbdomenAtlas2.0/data/colon_lesion_file_exists_ids.txt"

  intensity:
    a_min: -1000
    a_max: 1000

  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2
  fusion: False
  seed: 42
  num_workers: 2
  # if there are any examples loss or broken, please set in this flag.
  leapfrag: []
  checkModels: ["Only one"]
  target_size: [128, 128, 128]

  crop:
    pos: 3
    neg: 1
    num_samples: 2

  augment:
    flip_prob: 0.5
    scale_factor: 0.1
    shift_offset: 0.1
    intensity_prob: 0.2


BraTS_loader:
  train_ratio: 0.7
  val_ratio: 0.3
  fusion: False
  num_workers: 0
  image_size: 128
  dataPath: /mnt/liangjm/BRaTS2021/
  target_size: [128, 128, 128]

MNIST_loader:
  root: "/mnt/liangjm/AbdomenAtlas2/AdrenalMNIST3D"
  fusion: False
  num_workers: 8
  # if there are any examples loss or broken, please set in this flag.
  leapfrag: []
  checkModels: ["Only one"]
  target_size: [64, 64, 64]

  crop:
    pos: 3
    neg: 1
    num_samples: 2

  augment:
    flip_prob: 0.5
    scale_factor: 0.1
    shift_offset: 0.1
    intensity_prob: 0.2

valer:
  dl_score_csv_path: score

visualization:
  for_single: True
  target_layers: hidden_downsample
  visual:
    GCM:
      choose_image: "0002634197"
      write_path: output_seg
    GCNC:
      choose_image: "122570"
      write_path: output_seg
    FS:
      choose_image: "276"
      write_path: output_seg
  segmap:
    checkpoint: GCM_SegmentationHWAUNETR         # 可手动指定；None 时自动按当前训练配置推断
    use_best: True
    split: all               # train / val / test / all
    threshold: 0.5
    save_case_dir: True
    save_original_nifti: True
    save_gt_nifti: True
    save_pred_nifti: True

    GCM:
      choose_image: "0002367533"
      write_path: "export"
  heatmap:
    GCM:
      choose_image: "0001899404"
      write_path: output_slices
    GCNC:
      choose_image: "151829"
      write_path: output_slices
